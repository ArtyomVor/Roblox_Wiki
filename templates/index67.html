<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/JJS_Logo.png') }}">
    <title>JJS_Wiki =)</title>

    <style>
        body {
            background: linear-gradient(135deg, #1b1b1b, #2a2a2a);
            color: white;
            font-family: "Segoe UI", sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .carousel-container {
            width: 420px;
            background: #111;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .carousel-inner img {
            border-radius: 12px;
            width: 100%;
            height: auto;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            filter: invert(1);
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
    </style>
</head>

<body>
    <div class="carousel-container">
        <div class="title">You are...</div>
        <div id="marsCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="/static/img/takePhotoEmoji.png" alt="Ты...">
                </div>

                <div class="carousel-item">
                    <img src="/static/img/clownEmoji.png" alt="67 фанат">
                </div>
            </div>

            <button class="carousel-control-prev" type="button"
                    data-bs-target="#marsCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button"
                    data-bs-target="#marsCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
